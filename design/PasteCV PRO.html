<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PasteCV PRO — AI Batch Resume Parser</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet" />

<style>
  /* ── Tokens (lifted from Moncy DS, trimmed for an app surface) ── */
  :root {
    --accent: #c2a4ff;
    --accent-strong: #c481ff;
    --violet-900: #7f40ff;
    --violet-800: #aa42ff;
    --violet-50: #f2c0ff;

    --bg: #0b080c;
    --bg-2: #110d14;
    --bg-3: #15111a;
    --bg-4: #1c1724;
    --fg: #eae5ec;
    --fg-2: #ccc;
    --fg-3: #adacac;
    --fg-4: #5e5e5e;
    --divider: #2a2530;
    --divider-2: #363636;
    --chip-fill: rgba(255,255,255,0.06);
    --chip-border: rgba(255,255,255,0.18);

    --ok: #7be3a4;
    --warn: #ffd58a;
    --err: #ff7a8a;

    --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

    --ls-label: 4px;
    --ls-wider: 2px;
    --ls-wide: 1px;

    --r-sm: 4px;
    --r-md: 6px;
    --r-pill: 100px;

    --shadow-card: 0 10px 30px rgba(0,0,0,0.35);
    --glow-dot: 0 0 5px 2px #d29bff, 0 0 14px 6px rgba(208,151,255,0.55);
    --glow-soft: 0 0 0 1px rgba(194,164,255,0.35), 0 0 18px rgba(194,164,255,0.18);

    --dur-fast: 160ms;
    --dur-base: 240ms;
    --dur-med: 420ms;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Atmospheric backlight — single subtle orb top-right */
  body::before {
    content: "";
    position: fixed;
    top: -200px; right: -200px;
    width: 540px; height: 540px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(170,66,255,0.45), rgba(127,64,255,0.18) 40%, transparent 70%);
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed;
    bottom: -260px; left: -180px;
    width: 480px; height: 480px;
    border-radius: 50%;
    background: radial-gradient(circle at 70% 70%, rgba(194,164,255,0.22), rgba(127,64,255,0.08) 50%, transparent 75%);
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Top bar ───────────────────────────────────────────────── */
  .topbar {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--divider);
    background: rgba(11, 8, 12, 0.6);
    backdrop-filter: blur(8px);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: linear-gradient(140deg, var(--violet-900), var(--accent));
    box-shadow: var(--glow-soft);
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--bg);
    font-size: 14px;
    letter-spacing: -0.5px;
  }
  .brand-name {
    display: flex; flex-direction: column; line-height: 1;
  }
  .brand-name .n {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .brand-name .n .pro {
    color: var(--accent);
    margin-left: 4px;
  }
  .brand-name .tag {
    font-size: 10px;
    color: var(--fg-3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 400;
  }

  .top-actions { display: flex; align-items: center; gap: 10px; }
  .top-meta {
    color: var(--fg-3);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: var(--glow-dot);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }

  /* Buttons */
  .btn {
    appearance: none;
    border: 1px solid var(--divider-2);
    background: transparent;
    color: var(--fg);
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: var(--r-sm);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all var(--dur-fast) var(--ease);
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--divider-2); color: var(--fg); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }
  .btn-primary:hover { background: #fff; border-color: #fff; color: var(--bg); }
  .btn-primary:disabled:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  .btn-ghost { border-color: transparent; color: var(--fg-3); }
  .btn-ghost:hover { color: var(--accent); border-color: transparent; }

  .btn svg { width: 14px; height: 14px; }

  /* ── Workspace shell ───────────────────────────────────────── */
  .workspace {
    position: relative;
    z-index: 2;
    max-width: 1640px;
    margin: 0 auto;
    padding: 28px;
  }

  /* SPLIT */
  .layout-split .grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
    gap: 24px;
  }
  /* STACKED */
  .layout-stacked .grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 24px;
  }
  /* STEPPER — pane visibility controlled by .step-N class */
  .layout-stepper .grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 24px;
  }
  .layout-stepper .pane.input-pane { display: none; }
  .layout-stepper .pane.results-pane { display: none; }
  .layout-stepper.step-input .pane.input-pane { display: flex; }
  .layout-stepper.step-results .pane.results-pane { display: flex; }

  /* ── Pane (HUD card with corner ticks + dashed border) ─────── */
  .pane {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.005));
    padding: 22px;
    display: flex;
    flex-direction: column;
    min-height: 640px;
    border-radius: 2px;
  }
  .pane::before {
    content: "";
    position: absolute;
    inset: 0;
    border: 1px dashed rgba(255,255,255,0.10);
    border-radius: 2px;
    pointer-events: none;
  }
  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border: 0 solid var(--fg-2);
    pointer-events: none;
  }
  .corner.tl { top: -1px; left: -1px; border-top-width: 2px; border-left-width: 2px; }
  .corner.tr { top: -1px; right: -1px; border-top-width: 2px; border-right-width: 2px; }
  .corner.bl { bottom: -1px; left: -1px; border-bottom-width: 2px; border-left-width: 2px; }
  .corner.br { bottom: -1px; right: -1px; border-bottom-width: 2px; border-right-width: 2px; }

  .pane-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
  }
  .pane-head .title-row { display: flex; align-items: center; gap: 14px; }
  .pane-head h2 {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--fg);
  }
  .pane-head .seg {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--fg-3);
    font-family: var(--font-mono);
    font-weight: 400;
  }
  .pane-head .seg b { color: var(--accent); font-weight: 500; }

  /* ── Tabs (input pane) ─────────────────────────────────────── */
  .tabs {
    display: flex; gap: 2px;
    margin-bottom: 18px;
    flex-shrink: 0;
    background: var(--bg-3);
    padding: 4px;
    border-radius: var(--r-sm);
    border: 1px solid var(--divider);
    width: fit-content;
  }
  .tab {
    appearance: none; border: 0;
    background: transparent;
    color: var(--fg-3);
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 3px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all var(--dur-fast) var(--ease);
  }
  .tab svg { width: 13px; height: 13px; }
  .tab:hover { color: var(--fg); }
  .tab.active {
    background: var(--accent);
    color: var(--bg);
  }
  .tab .badge {
    background: rgba(0,0,0,0.2);
    color: inherit;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-weight: 500;
  }
  .tab:not(.active) .badge {
    background: var(--bg-4);
    color: var(--fg-2);
  }

  /* ── Paste textarea ────────────────────────────────────────── */
  .paste-wrap {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .paste {
    flex: 1;
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--divider);
    border-radius: var(--r-md);
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 18px 18px 50px 18px;
    resize: none;
    outline: none;
    transition: border-color var(--dur-fast) var(--ease);
    min-height: 380px;
  }
  .paste:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(194,164,255,0.08);
  }
  .paste::placeholder { color: var(--fg-4); font-family: var(--font-sans); font-weight: 300; font-style: italic; }

  .paste-foot {
    position: absolute;
    left: 14px; right: 14px; bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  .paste-foot .meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-4);
    letter-spacing: 1px;
  }
  .paste-foot .sample-btn {
    pointer-events: auto;
    background: var(--bg-3);
    border: 1px solid var(--divider);
    color: var(--fg-3);
    font-family: var(--font-sans);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: all var(--dur-fast) var(--ease);
  }
  .paste-foot .sample-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Dropzone ──────────────────────────────────────────────── */
  .dropzone {
    flex: 1;
    border: 1.5px dashed var(--divider-2);
    border-radius: var(--r-md);
    background: var(--bg-2);
    padding: 28px;
    display: flex;
    flex-direction: column;
    transition: all var(--dur-base) var(--ease);
    min-height: 380px;
  }
  .dropzone.empty {
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(194,164,255,0.04);
  }
  .dz-icon {
    width: 56px; height: 56px;
    border: 1.5px dashed var(--accent);
    border-radius: 50%;
    display: grid; place-items: center;
    margin-bottom: 18px;
    color: var(--accent);
  }
  .dz-icon svg { width: 24px; height: 24px; }
  .dz-title {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .dz-title b { color: var(--accent); font-weight: 500; }
  .dz-sub {
    font-size: 12px;
    color: var(--fg-3);
    letter-spacing: 1px;
    max-width: 320px;
    line-height: 1.6;
    margin-bottom: 18px;
  }
  .dz-formats {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    background: var(--chip-fill);
    border: 1px solid var(--chip-border);
    border-radius: var(--r-pill);
    color: var(--fg-2);
    font-family: var(--font-mono);
    font-weight: 400;
  }

  /* Staged file list */
  .file-list {
    flex: 1;
    overflow-y: auto;
    margin: 0 -4px;
    padding: 0 4px;
  }
  .file-list::-webkit-scrollbar { width: 6px; }
  .file-list::-webkit-scrollbar-track { background: transparent; }
  .file-list::-webkit-scrollbar-thumb { background: var(--divider-2); border-radius: 3px; }

  .file-row {
    display: grid;
    grid-template-columns: 36px 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: var(--bg-3);
    border: 1px solid var(--divider);
    border-radius: var(--r-md);
    margin-bottom: 8px;
    transition: all var(--dur-fast) var(--ease);
  }
  .file-row:hover { border-color: rgba(194,164,255,0.4); }
  .file-icon {
    width: 36px; height: 36px;
    border-radius: var(--r-sm);
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .file-icon.pdf { background: rgba(255,122,138,0.12); color: var(--err); border: 1px solid rgba(255,122,138,0.3); }
  .file-icon.docx { background: rgba(123,180,255,0.12); color: #7bb4ff; border: 1px solid rgba(123,180,255,0.3); }
  .file-icon.txt { background: rgba(123,227,164,0.12); color: var(--ok); border: 1px solid rgba(123,227,164,0.3); }
  .file-info { min-width: 0; }
  .file-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .file-meta {
    font-size: 11px;
    color: var(--fg-3);
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }
  .icon-btn {
    appearance: none; background: transparent; border: 0;
    color: var(--fg-3);
    cursor: pointer;
    padding: 6px;
    border-radius: var(--r-sm);
    display: grid; place-items: center;
    transition: all var(--dur-fast) var(--ease);
  }
  .icon-btn:hover { color: var(--accent); background: rgba(194,164,255,0.08); }
  .icon-btn.danger:hover { color: var(--err); background: rgba(255,122,138,0.08); }
  .icon-btn svg { width: 16px; height: 16px; }

  .file-actions { display: flex; gap: 4px; }

  .file-add-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--divider);
    flex-shrink: 0;
  }
  .file-add-row .summary {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-3);
    letter-spacing: 1px;
  }
  .file-add-row .summary b { color: var(--accent); font-weight: 500; }

  /* Footer action bar (input pane) */
  .pane-foot {
    display: flex; align-items: center; gap: 10px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--divider);
    flex-shrink: 0;
  }
  .pane-foot .spacer { flex: 1; }

  /* ── Results ───────────────────────────────────────────────── */
  .results-pane { min-height: 640px; }

  .results-empty {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    color: var(--fg-3);
    padding: 40px;
  }
  .results-empty .ring {
    width: 120px; height: 120px;
    border: 1px dashed rgba(194,164,255,0.4);
    border-radius: 50%;
    display: grid; place-items: center;
    margin-bottom: 28px;
    position: relative;
  }
  .results-empty .ring::before {
    content: "";
    position: absolute; inset: -8px;
    border: 1px dashed rgba(194,164,255,0.15);
    border-radius: 50%;
    animation: spin 18s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .results-empty .ring-inner {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent), var(--violet-900));
    box-shadow: var(--glow-dot);
  }
  .results-empty h3 {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--fg);
  }
  .results-empty p {
    margin: 0; max-width: 380px;
    font-size: 13px;
    line-height: 1.7;
    letter-spacing: 0.5px;
  }
  .results-empty .hint-row {
    margin-top: 24px;
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .hint-pill {
    font-size: 10px;
    font-family: var(--font-mono);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--divider);
    border-radius: var(--r-pill);
    color: var(--fg-3);
  }

  /* Processing state */
  .processing {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .scan {
    width: 160px; height: 160px;
    position: relative;
    margin-bottom: 32px;
  }
  .scan-ring {
    position: absolute; inset: 0;
    border: 1px dashed rgba(194,164,255,0.5);
    border-radius: 50%;
    animation: spin 6s linear infinite;
  }
  .scan-ring.r2 { inset: 16px; border-style: solid; border-color: rgba(194,164,255,0.12); animation: spin 12s linear infinite reverse; }
  .scan-core {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent), var(--violet-900));
    box-shadow: var(--glow-dot);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .scan-tick {
    position: absolute;
    width: 6px; height: 1px;
    background: var(--accent);
    top: 50%; left: 50%;
    transform-origin: 80px 0;
  }
  .processing h3 {
    margin: 0 0 6px;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .processing .status {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-3);
    letter-spacing: 1.5px;
    margin-bottom: 24px;
    min-height: 18px;
  }
  .progress-bar {
    width: 320px;
    max-width: 100%;
    height: 4px;
    background: var(--bg-3);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, var(--violet-900), var(--accent));
    box-shadow: 0 0 12px rgba(194,164,255,0.6);
    transition: width 200ms linear;
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    width: 320px; max-width: 100%;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--fg-4);
  }

  /* Results — populated */
  .results-toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .results-toolbar .summary {
    flex: 1;
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  .summary-stat {
    display: flex; align-items: baseline; gap: 6px;
  }
  .summary-stat .num {
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
    font-family: var(--font-mono);
    letter-spacing: -1px;
    line-height: 1;
  }
  .summary-stat .lbl {
    font-size: 10px;
    color: var(--fg-3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .summary-divider { width: 1px; height: 28px; background: var(--divider); }

  .view-toggle {
    display: inline-flex;

    color: var(--fg-3);
    font-family: var(--font-sans);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all var(--dur-fast) var(--ease);

  .view-toggle button:hover { color: var(--fg); }
  .view-toggle button.active {
    background: var(--accent);
    color: var(--bg);

    margin: 0 -4px;
    padding: 0 4px 4px 4px;
    min-height: 0;

  .results-body::-webkit-scrollbar { width: 6px; }
  .results-body::-webkit-scrollbar-thumb { background: var(--divider-2); border-radius: 3px; }

  /* Resume cards (Pretty) */
  .resume-card {
    background: var(--bg-2);
    border: 1px solid var(--divider);
    border-radius: var(--r-md);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color var(--dur-fast) var(--ease);
  }
  .resume-card:hover { border-color: rgba(194,164,255,0.35); }
  .rc-head {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }
  .rc-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(194,164,255,0.08);
    border: 1px solid rgba(194,164,255,0.3);
    padding: 4px 10px;
    border-radius: var(--r-pill);
    letter-spacing: 1px;
    font-weight: 500;

  .rc-id {
    min-width: 0;

  .rc-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--fg);
    margin: 0 0 3px;
    letter-spacing: 0.3px;

    color: var(--fg-3);
    letter-spacing: 0.5px;

    width: 28px; height: 28px;

    border-radius: 50%;

    color: var(--fg-3);
    transition: all var(--dur-base) var(--ease);

    display: none;

  .resume-card.open .rc-body { display: block; }

  .rc-section {
    padding: 16px 0;

    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 12px;
    display: flex; align-items: center; gap: 10px;

    content: ""; flex: 1; height: 1px;

    letter-spacing: 2px;
    color: var(--fg-4);
    margin-bottom: 4px;

    display: inline-flex; align-items: center;

    color: var(--fg);

  <script type="text/babel">
    function syntaxHighlight(json) {
      // Escape HTML
      const esc = json.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return esc.replace(
        /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        (match) => {
          let cls = "n";
          if (/^"/.test(match)) cls = /:$/.test(match) ? "k" : "s";
          else if (/true|false/.test(match)) cls = "b";
          else if (/null/.test(match)) cls = "nl";
          return `<span class="${cls}">${match}</span>`;
        }
      );
    }
    function JsonView({ data }) {
      const text = JSON.stringify(data, null, 2);
      return <pre className="json-view" dangerouslySetInnerHTML={{ __html: syntaxHighlight(text) }} />;
    }
    window.JsonView = JsonView;
  </script>

  <!-- Main app -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "layout": "split"
    }/*EDITMODE-END*/;

    const TWEAK_OPTIONS = {
      layout: [
        { value: "split",   label: "Split" },
        { value: "stepper", label: "Stepper" },
        { value: "stacked", label: "Stacked" },
      ],
    };

    function fmtBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      return (n / 1024 / 1024).toFixed(2) + " MB";
    }
    function fileExt(name) {
      const i = name.lastIndexOf(".");
      return i >= 0 ? name.slice(i + 1).toLowerCase() : "";
    }

    function App() {
      // Tweaks
      const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

      // Stepper sub-state
      const [step, setStep] = useState("input"); // input | results

      // Input mode
      const [mode, setMode] = useState("paste"); // paste | upload
      const [text, setText] = useState("");
      const [files, setFiles] = useState([]); // {id, name, size, ext}
      const [dragOver, setDragOver] = useState(false);
      const [previewFile, setPreviewFile] = useState(null);

      // Processing / results
      const [phase, setPhase] = useState("idle"); // idle | processing | done
      const [progress, setProgress] = useState(0);
      const [statusMsg, setStatusMsg] = useState("");
      const [results, setResults] = useState([]);
      const [view, setView] = useState("pretty"); // pretty | json

      // Toast
      const [toast, setToast] = useState(null);
      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2200);
      };

      const fileInputRef = useRef(null);

      // Mock processing
      const runParse = () => {
        if (phase === "processing") return;
        const hasInput = (mode === "paste" && text.trim().length > 30) || (mode === "upload" && files.length > 0);
        if (!hasInput) {
          showToast("Add some text or files first");
          return;
        }
        setPhase("processing");
        setProgress(0);
        setResults([]);

        const targetCount = mode === "paste"
          ? Math.max(1, (text.match(/——/g) || text.match(/\n\n\n/g) || []).length || 3)
          : files.length;

        const messages = [
          "Tokenizing input…",
          "Detecting CV boundaries…",
          "Extracting contact details…",
          "Parsing experience timeline…",
          "Normalizing skills taxonomy…",
          "Scoring confidence…",
          "Finalizing structured records…",
        ];

        let i = 0;
        const totalMs = 3200;
        const tickMs = 80;
        const ticks = totalMs / tickMs;
        let t = 0;
        const id = setInterval(() => {
          t++;
          const p = Math.min(100, Math.round((t / ticks) * 100));
          setProgress(p);
          const msgIdx = Math.min(messages.length - 1, Math.floor((p / 100) * messages.length));
          if (msgIdx !== i) { i = msgIdx; setStatusMsg(messages[i]); }
          if (p >= 100) {
            clearInterval(id);
            // Build results
            let out;
            if (mode === "paste") {
              out = SAMPLE_RESULTS.slice(0, Math.min(SAMPLE_RESULTS.length, Math.max(1, targetCount)));
            } else {
              out = files.map((f, idx) => {
                const persona = FILE_PERSONA_LIBRARY[idx % FILE_PERSONA_LIBRARY.length];
                return {
                  id: `cv-${String(idx + 1).padStart(3, "0")}`,
                  source: f.name,
                  confidence: 0.88 + Math.random() * 0.1,
                  ...persona,
                };
              });
            }
            setResults(out);
            setPhase("done");
            setStatusMsg("");
            if (tweaks.layout === "stepper") setStep("results");
            showToast(`Parsed ${out.length} CV${out.length > 1 ? "s" : ""}`);
          }
        }, tickMs);
      };

      // File ops
      const addFiles = (newFiles) => {
        const ok = ["pdf", "docx", "doc", "txt"];
        const next = Array.from(newFiles)
          .filter(f => ok.includes(fileExt(f.name)))
          .map(f => ({
            id: Math.random().toString(36).slice(2, 9),
            name: f.name,
            size: f.size,
            ext: fileExt(f.name),
          }));
        if (next.length === 0) {
          showToast("Only PDF, DOCX, DOC, TXT are supported");
          return;
        }
        setFiles(prev => [...prev, ...next]);
        showToast(`Added ${next.length} file${next.length > 1 ? "s" : ""}`);
      };

      const onPickFiles = (e) => {
        if (e.target.files?.length) addFiles(e.target.files);
        e.target.value = "";
      };

      const onDrop = (e) => {
        e.preventDefault(); setDragOver(false);
        if (e.dataTransfer.files?.length) addFiles(e.dataTransfer.files);
      };

                        <div className="file-add-row">
                          <span className="summary">
                            <b>{files.length}</b> file{files.length>1?"s":""} staged · <b>{fmtBytes(totalBytes)}</b> total
                          </span>
                          <button className="btn" onClick={() => fileInputRef.current?.click()}>
                            <I.Plus /> Add more
                          </button>
                          <button className="btn" onClick={() => setFiles([])}>
                            <I.Trash /> Clear all
                          </button>
                        </div>
                      </div>
                    )}
                    <input
                      ref={fileInputRef}
                      type="file"
                      multiple
                      accept=".pdf,.docx,.doc,.txt"
                      style={{ display: "none" }}
                      onChange={onPickFiles}
                    />
                  </>
                )}

                {/* Footer action */}
                <div className="pane-foot">
                  <span className="seg" style={{ color: "var(--fg-3)" }}>
                    {phase === "processing" ? "Processing…" : canParse ? "Ready to analyze" : "Awaiting input"}
                  </span>
                  <div className="spacer"/>
                  {hasInput && (
                    <button className="btn" onClick={() => { mode === "paste" ? setText("") : setFiles([]); }}>
                      Clear
                    </button>
                  )}
                  <button className="btn btn-primary" onClick={runParse} disabled={!canParse || phase === "processing"}>
                    <I.Bolt /> {phase === "processing" ? "Analyzing…" : "Analyze with AI"}
                  </button>
                </div>
              </section>

              {/* ── RESULTS PANE ───────────────────────────────────── */}
              <section className="pane results-pane">
                <span className="corner tl"/><span className="corner tr"/><span className="corner bl"/><span className="corner br"/>

                <div className="pane-head">
                  <div className="title-row">
                    <h2>Extraction</h2>
                    <span className="seg">/ {phase === "done" ? "STRUCTURED OUTPUT" : phase === "processing" ? "RUNNING" : "AWAITING"}</span>
                  </div>
                  {phase === "done" && (
                    <span className="seg">
                      <b>{results.length}</b> CV{results.length>1?"s":""} · avg conf <b>{(results.reduce((a,r)=>a+(r.confidence||0),0)/results.length*100).toFixed(0)}%</b>
                    </span>
                  )}
                </div>

                {/* IDLE */}
                {phase === "idle" && (
                  <div className="results-empty">
                    <div className="ring"><div className="ring-inner"/></div>
                    <h3>No extraction yet</h3>
                    <p>Paste raw resume text or upload a batch of files on the left, then trigger the AI analysis. Structured candidate records will appear here.</p>
                    <div className="hint-row">
                      <span className="hint-pill">Multi-CV Detection</span>
                      <span className="hint-pill">PDF · DOCX · TXT</span>
                      <span className="hint-pill">JSON Export</span>
                    </div>
                  </div>
                )}

                {/* PROCESSING */}
                {phase === "processing" && (
                  <div className="processing">
                    <div className="scan">
                      <div className="scan-ring"/>
                      <div className="scan-ring r2"/>
                      <div className="scan-core"/>
                    </div>
                    <h3>Analyzing input</h3>
                    <div className="status">{statusMsg || "Initializing parser…"}</div>
                    <div className="progress-bar"><div className="progress-fill" style={{ width: progress + "%" }}/></div>
                    <div className="progress-meta">
                      <span>{progress}%</span>
                      <span>est. {Math.max(0, Math.round(((100-progress)/100)*3.2))}s remaining</span>
                    </div>
                  </div>
                )}

                {/* DONE */}
                {phase === "done" && (
                  <>
                    <div className="results-toolbar">
                      <div className="summary">
                        <div className="summary-stat">
                          <span className="num">{results.length}</span>
                          <span className="lbl">CV{results.length>1?"s":""} parsed</span>
                        </div>
                        <div className="summary-divider"/>
                        <div className="summary-stat">
                          <span className="num">{results.reduce((a,r)=>a+(r.skills?.length||0),0)}</span>
                          <span className="lbl">Skills</span>
                        </div>
                        <div className="summary-divider"/>
                        <div className="summary-stat">
                          <span className="num">{results.reduce((a,r)=>a+(r.experience?.length||0),0)}</span>
                          <span className="lbl">Roles</span>
                        </div>
                      </div>
                      <div className="view-toggle">
                        <button className={view==="pretty"?"active":""} onClick={()=>setView("pretty")}>Pretty</button>
                        <button className={view==="json"?"active":""} onClick={()=>setView("json")}>JSON</button>
                      </div>
                    </div>

                    <div className="results-body">
                      {view === "pretty" && results.map((r, i) => (
                        <ResumeCard key={r.id} data={r} idx={i} defaultOpen={i === 0} />
                      ))}
                      {view === "json" && <JsonView data={results} />}
                    </div>

                    <div className="pane-foot">
                      <span className="seg" style={{ color: "var(--fg-3)" }}>
                        Source: {mode === "paste" ? "pasted text" : `${files.length} file${files.length>1?"s":""}`}
                      </span>
                      <div className="spacer"/>
                      <button className="btn" onClick={copyAll}><I.Copy /> Copy JSON</button>
                      <button className="btn" onClick={downloadPdf}><I.Download /> Download PDF</button>
                      <button className="btn btn-primary" onClick={reset}><I.Reset /> New Batch</button>
                    </div>
                  </>
                )}
              </section>
            </div>

            <div className="footnote">
              PasteCV PRO · <span>v1.4</span> · Designed for high-volume HR teams · Mocked data, no resumes leave your device
            </div>
          </main>

          {/* Preview overlay */}
          {previewFile && (
            <div
              onClick={() => setPreviewFile(null)}
              style={{
                position: "fixed", inset: 0, zIndex: 200,
                background: "rgba(0,0,0,0.7)", backdropFilter: "blur(8px)",
                display: "grid", placeItems: "center", padding: 24,
              }}
            >
              <div
                onClick={(e) => e.stopPropagation()}
                style={{
                  width: "min(720px, 100%)", maxHeight: "80vh",
                  background: "var(--bg-2)", border: "1px solid var(--accent)",
                  borderRadius: 6, padding: 28, position: "relative",
                  boxShadow: "0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(194,164,255,0.15)",
                  overflow: "auto",
                }}
              >
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, paddingBottom: 14, borderBottom: "1px solid var(--divider)" }}>
                  <div>
                    <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "var(--accent)", marginBottom: 6 }}>File preview</div>
                    <div style={{ fontSize: 18, fontWeight: 500 }}>{previewFile.name}</div>
                    <div style={{ fontSize: 11, color: "var(--fg-3)", fontFamily: "var(--font-mono)", marginTop: 4 }}>
                      {fmtBytes(previewFile.size)} · .{previewFile.ext}
                    </div>
                  </div>
                  <button className="icon-btn" onClick={() => setPreviewFile(null)} title="Close">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
                <div style={{ display: "grid", placeItems: "center", padding: "40px 20px", border: "1px dashed var(--divider-2)", borderRadius: 6, background: "var(--bg)" }}>
                  <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-3)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 16 }}>
                    [ Document Preview ]
                  </div>
                  <div style={{ width: 200, height: 260, background: "linear-gradient(180deg, #fff, #ddd)", borderRadius: 4, padding: 18, color: "#222", fontSize: 9, lineHeight: 1.4, position: "relative", boxShadow: "0 12px 32px rgba(0,0,0,0.4)" }}>
                    <div style={{ height: 4, background: "var(--violet-900)", marginBottom: 10 }}/>
                    <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 4 }}>Candidate Resume</div>
                    <div style={{ fontSize: 8, color: "#666", marginBottom: 10 }}>{previewFile.name}</div>
                    {Array.from({length: 14}).map((_, i) => (
                      <div key={i} style={{ height: 3, background: "#bbb", marginBottom: 5, width: `${60 + Math.random()*40}%`}}/>
                    ))}
                  </div>
                  <div style={{ marginTop: 18, fontSize: 11, color: "var(--fg-3)", letterSpacing: 1, textAlign: "center", maxWidth: 420 }}>
                    Full document rendering is mocked in this prototype. The real product would extract and display page thumbnails here.
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          <div className={`toast ${toast ? "show" : ""}`}>
            <I.Check /> {toast}
          </div>

          {/* Tweaks panel */}
          <TweaksPanel title="Tweaks">
            <TweakSection title="Layout">
              <TweakRadio
                label="Workspace mode"
                value={tweaks.layout}
                onChange={(v) => setTweaks("layout", v)}
                options={TWEAK_OPTIONS.layout}
              />
              <div style={{ fontSize: 10, color: "var(--fg-4, #5e5e5e)", lineHeight: 1.5, marginTop: 4, letterSpacing: 0.5 }}>
                <b style={{color:"var(--accent)"}}>Split</b> — input + results side-by-side (HR default).<br/>
                <b style={{color:"var(--accent)"}}>Stepper</b> — 3-step guided flow.<br/>
                <b style={{color:"var(--accent)"}}>Stacked</b> — single column, scroll-down.
              </div>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
